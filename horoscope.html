<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星座占い - 原宿ネオ占い</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        .horoscope-container {
            max-width: 1000px;
            margin: 100px auto 50px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shooting-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: linear-gradient(90deg, #fff, transparent);
            height: 2px;
            filter: drop-shadow(0 0 5px #fff);
            animation: shooting-star linear infinite;
        }

        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            position: relative;
            z-index: 1;
            margin-top: 40px;
        }

        .zodiac-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .zodiac-item:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: scale(1.05);
            border-color: #667eea;
        }

        .zodiac-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4) 0%, rgba(118, 75, 162, 0.4) 100%);
            border-color: #a78bfa;
        }

        .zodiac-symbol {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }

        .zodiac-name {
            font-weight: bold;
            color: #fff;
            display: block;
        }

        .zodiac-dates {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .result-panel {
            margin-top: 50px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: none;
            position: relative;
            z-index: 1;
            border-left: 5px solid #667eea;
        }

        .result-panel h2 {
            margin-top: 0;
            background: linear-gradient(135deg, #667eea 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .luck-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #667eea;
            color: #fff;
            border-radius: 15px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .back-home {
            display: inline-block;
            margin: 20px 0;
            color: #a78bfa;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">🔮 原宿ネオ占い</div>
            <ul class="nav-links">
                <li><a href="index.html">ホーム</a></li>
                <li><a href="horoscope.html" class="active">星座占い</a></li>
                <li><a href="tarot.html">タロット占い</a></li>
                <li><a href="crystal.html">水晶占い</a></li>
            </ul>
        </nav>
    </header>

    <div class="horoscope-container">
        <div class="shooting-stars" id="star-container"></div>

        <a href="index.html" class="back-home">← ホームに戻る</a>

        <h1 class="section-title">星座占い</h1>
        <p style="text-align: center; color: rgba(255,255,255,0.7);">あなたの星座を選んで、今週の運勢をチェックしましょう。</p>

        <div class="zodiac-grid" id="zodiac-grid">
            <!-- JavaScriptで生成 -->
        </div>

        <div class="result-panel" id="result-panel">
            <h2 id="result-title">おひつじ座の運勢</h2>
            <div class="luck-badge" id="luck-badge">大吉</div>
            <p id="result-text">運勢のテキストがここに入ります。</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 原宿ネオ占い. All rights reserved.</p>
        <div style="margin-top: 10px;">
            <a href="sitemap.html"
                style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem;">サイトマップ</a> |
            <a href="sitemap.xml"
                style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem;">XML</a>
        </div>
    </footer>

    <script src="fortune-engine.js"></script>
    <script>
        // 星座グリッドの生成
        const grid = document.getElementById('zodiac-grid');
        FortuneEngine.zodiacSigns.forEach((sign, index) => {
            const item = document.createElement('div');
            item.className = 'zodiac-item';
            item.innerHTML = `
                <span class="zodiac-symbol">${sign.symbol}</span>
                <span class="zodiac-name">${sign.name}</span>
                <span class="zodiac-dates">${sign.dates}</span>
            `;
            item.onclick = () => showFortune(index, sign.name);
            grid.appendChild(item);
        });

        // 運勢の表示
        function showFortune(index, name) {
            // アクティブ状態の切り替え
            document.querySelectorAll('.zodiac-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.zodiac-item')[index].classList.add('active');

            const result = FortuneEngine.getWeeklyFortune(index);
            const panel = document.getElementById('result-panel');
            const title = document.getElementById('result-title');
            const luck = document.getElementById('luck-badge');
            const text = document.getElementById('result-text');

            panel.style.display = 'block';
            panel.style.opacity = '0';
            panel.style.transform = 'translateY(20px)';

            setTimeout(() => {
                title.textContent = `${name}の今週の運勢`;
                luck.textContent = result.luck;
                text.textContent = result.message;
                panel.style.transition = 'all 0.5s ease';
                panel.style.opacity = '1';
                panel.style.transform = 'translateY(0)';
            }, 100);

            panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // 流れ星アニメーション
        function createStar() {
            const container = document.getElementById('star-container');
            const star = document.createElement('div');
            star.className = 'star';

            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight / 2;
            const length = Math.random() * 80 + 50;
            const duration = Math.random() * 2 + 1;

            star.style.width = `${length}px`;
            star.style.left = `${startX}px`;
            star.style.top = `${startY}px`;
            star.style.animationDuration = `${duration}s`;

            container.appendChild(star);

            setTimeout(() => {
                star.remove();
            }, duration * 1000);
        }

        setInterval(createStar, 2000);
    </script>
</body>

</html>
