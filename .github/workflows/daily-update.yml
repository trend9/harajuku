name: Daily Column Update

on:
  schedule:
    - cron: '0 15 * * *' # 日本時間 0:00 (UTC 15:00)
  workflow_dispatch: # 手動実行も可能にする

# 全体的な権限設定
permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  update-columns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # pushを行うため、履歴をすべて取得
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate articles and index
        run: |
          # スクリプトを実行（エラーが出ても止まらないように || true をつけることも可能ですが、基本はこのままでOK）
          node generate-columns.js
          node generate-sitemap.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 変更されたファイルをすべて追加（columns/ 以下の新着記事も含めるため）
          git add . 
          git commit -m "chore: daily update $(date +'%Y-%m-%d')" || exit 0
          git push

      # ↓ ファイルを更新した後に、そのまま最新状態をPagesにデプロイするステップを追加しておくと確実です！
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4