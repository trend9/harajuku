<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タロット占い - 原宿ネオ占い</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        .tarot-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tarot-left {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tarot-right {
            flex: 1;
            min-width: 300px;
            padding: 20px;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.8s ease;
        }

        .tarot-right.active {
            opacity: 1;
            transform: translateX(0);
        }

        .card-wrapper {
            perspective: 1000px;
            width: 250px;
            height: 400px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-wrapper.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 15px;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-back {
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 5rem;
        }

        .card-back::after {
            content: "✨";
            animation: glow 2s infinite;
        }

        .card-front {
            background: #fff;
            color: #333;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-image {
            font-size: 8rem;
            margin-bottom: 20px;
        }

        .card-name-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1a1a2e;
        }

        .tarot-meaning-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border-left: 5px solid #a78bfa;
        }

        .tarot-meaning-box h2 {
            margin-top: 0;
            color: #a78bfa;
        }

        .tarot-meaning-box p {
            line-height: 1.8;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .instructions {
            text-align: center;
            margin-bottom: 20px;
            color: #a78bfa;
            font-weight: bold;
            animation: float 3s infinite;
        }

        .back-home {
            margin-bottom: 20px;
            display: inline-block;
            color: #a78bfa;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .tarot-container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">🔮 原宿ネオ占い</div>
            <ul class="nav-links">
                <li><a href="index.html">ホーム</a></li>
                <li><a href="horoscope.html">星座占い</a></li>
                <li><a href="tarot.html" class="active">タロット占い</a></li>
                <li><a href="crystal.html">水晶占い</a></li>
            </ul>
        </nav>
    </header>

    <div class="tarot-container">
        <div class="tarot-left">
            <a href="index.html" class="back-home">← ホームに戻る</a>
            <div class="instructions" id="instruction">カードをクリックして運命をめくりましょう</div>
            <div class="card-wrapper" id="card-wrapper" onclick="flipCard()">
                <div class="card-inner">
                    <div class="card-back">
                        <!-- カードの裏面 -->
                    </div>
                    <div class="card-front">
                        <div class="card-image" id="card-symbol">🃏</div>
                        <div class="card-name-title" id="card-name">カード名</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tarot-right" id="result-panel">
            <div class="tarot-meaning-box">
                <h2>カードの意味</h2>
                <p id="card-meaning">カードをめくると、ここにあなたへのメッセージが表示されます。</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 原宿ネオ占い. All rights reserved.</p>
    </footer>

    <script src="fortune-engine.js"></script>
    <script>
        let isFlipped = false;

        function flipCard() {
            if (isFlipped) return;
            isFlipped = true;

            const card = FortuneEngine.getDailyTarot();

            document.getElementById('card-symbol').textContent = getTarotEmoji(card.name);
            document.getElementById('card-name').textContent = card.name;
            document.getElementById('card-meaning').textContent = card.meaning;

            document.getElementById('card-wrapper').classList.add('flipped');
            document.getElementById('instruction').style.display = 'none';

            setTimeout(() => {
                document.getElementById('result-panel').classList.add('active');
            }, 500);
        }

        function getTarotEmoji(name) {
            const emojiMap = {
                "愚者": "🃏", "魔術師": "🪄", "女教皇": "📜", "女帝": "👑",
                "皇帝": "🏰", "教皇": "⛪", "恋人": "💖", "戦車": "🎠",
                "力": "🦁", "隠者": "🕯️", "運命の輪": "🎡", "正義": "⚖️",
                "吊るされた男": "🪢", "死神": "💀", "節制": "🏺", "悪魔": "😈",
                "塔": "⚡", "星": "⭐", "月": "🌙", "太陽": "☀️",
                "審判": "🎺", "世界": "🌍"
            };
            return emojiMap[name] || "🃏";
        }
    </script>
</body>

</html>
